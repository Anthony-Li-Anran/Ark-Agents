<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amiya - Memo</title>
    <link rel="stylesheet" href="styles/dashboard.css">
    <style>
        .memo-list {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }
        
        .memo-item {
            padding: 0.625rem 0.75rem;
            border-radius: calc(var(--radius) - 2px);
            cursor: pointer;
            transition: all 0.15s ease;
            border: 1px solid transparent;
        }
        
        .memo-item:hover {
            background: hsl(var(--accent));
        }
        
        .memo-item.active {
            background: hsl(var(--accent));
            border-color: hsl(var(--ring));
        }
        
        .memo-item-title {
            font-weight: 500;
            font-size: 0.8125rem;
            margin-bottom: 0.125rem;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        .memo-item-preview {
            font-size: 0.6875rem;
            color: hsl(var(--muted-foreground));
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        .editor-card {
            display: flex;
            flex-direction: column;
            height: calc(100vh - 7rem);
        }
        
        .editor-body {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            overflow: hidden;
        }
        
        .title-input {
            height: 2.25rem;
            font-size: 1rem;
            font-weight: 600;
        }
        
        .tags-input {
            height: 2rem;
            font-size: 0.8125rem;
        }
        
        .content-textarea {
            flex: 1;
            min-height: 0;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            font-size: 0.875rem;
            line-height: 1.6;
            resize: none;
        }
        
        .editor-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-top: 0.75rem;
            margin-top: 0.75rem;
            border-top: 1px solid hsl(var(--border));
            flex-shrink: 0;
        }
        
        .search-row {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 0.75rem;
        }
        
        .search-input {
            flex: 1;
            height: 2rem;
            font-size: 0.8125rem;
        }
        
        .add-btn {
            width: 2rem;
            height: 2rem;
            padding: 0;
            font-size: 1rem;
        }
    </style>
</head>
<body>
    <div class="dashboard-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">M</div>
                <span class="sidebar-title">Memo</span>
            </div>
            
            <div class="search-row">
                <input class="input search-input" id="search" placeholder="Search...">
                <button class="btn btn-primary add-btn" onclick="newMemo()" title="New Memo">+</button>
            </div>
            
            <div class="sidebar-content">
                <div class="memo-list" id="memo-list"></div>
            </div>
        </aside>
        
        <main class="main-content">
            <div class="page-header">
                <div>
                    <h1 class="page-title" id="page-title">Memo</h1>
                    <p class="page-description">Create and manage your notes</p>
                </div>
            </div>
            
            <div class="card editor-card">
                <div class="editor-body">
                    <input class="input title-input" id="memo-title" placeholder="Title">
                    <input class="input tags-input" id="memo-tags" placeholder="Tags (comma separated)">
                    <textarea class="textarea content-textarea" id="memo-content" placeholder="Write your notes here..."></textarea>
                </div>
                <div class="editor-footer">
                    <span class="text-sm text-muted" id="memo-meta">No memo selected</span>
                    <div class="flex gap-2">
                        <button class="btn btn-outline btn-sm" onclick="deleteCurrentMemo()">Delete</button>
                        <button class="btn btn-primary btn-sm" onclick="saveMemo()">Save</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const { ipcRenderer } = require('electron');

        let memos = [];
        let currentId = null;

        async function loadMemos(query = '') {
            memos = query
                ? await ipcRenderer.invoke('memo-search', query)
                : await ipcRenderer.invoke('memo-get-all');
            renderList();
            if (!currentId && memos.length > 0) {
                selectMemo(memos[0].id);
            }
            if (memos.length === 0) {
                clearEditor();
            }
        }

        function renderList() {
            const list = document.getElementById('memo-list');
            if (memos.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📝</div>
                        <div class="empty-state-title">No memos</div>
                        <div class="empty-state-description">Click + to create</div>
                    </div>
                `;
                return;
            }

            list.innerHTML = memos.map(memo => `
                <div class="memo-item ${memo.id === currentId ? 'active' : ''}" onclick="selectMemo('${memo.id}')">
                    <div class="memo-item-title">${escapeHtml(memo.title || 'Untitled')}</div>
                    <div class="memo-item-preview">${escapeHtml((memo.content || '').slice(0, 50))}</div>
                </div>
            `).join('');
        }

        async function selectMemo(id) {
            const memo = await ipcRenderer.invoke('memo-get-by-id', id);
            if (!memo) return;

            currentId = id;
            document.getElementById('memo-title').value = memo.title || '';
            document.getElementById('memo-content').value = memo.content || '';
            document.getElementById('memo-tags').value = (memo.tags || []).join(', ');
            document.getElementById('memo-meta').textContent = `Updated ${formatDate(memo.updatedAt)}`;
            document.getElementById('page-title').textContent = memo.title || 'Memo';
            renderList();
        }

        function newMemo() {
            currentId = null;
            document.getElementById('memo-title').value = '';
            document.getElementById('memo-content').value = '';
            document.getElementById('memo-tags').value = '';
            document.getElementById('memo-meta').textContent = 'New memo';
            document.getElementById('page-title').textContent = 'New Memo';
            document.getElementById('memo-title').focus();
            renderList();
        }

        async function saveMemo() {
            const memoData = {
                title: document.getElementById('memo-title').value.trim() || 'Untitled',
                content: document.getElementById('memo-content').value,
                tags: document.getElementById('memo-tags').value.split(',').map(tag => tag.trim()).filter(Boolean)
            };

            const memo = currentId
                ? await ipcRenderer.invoke('memo-update', currentId, memoData)
                : await ipcRenderer.invoke('memo-create', memoData);
            currentId = memo.id;
            document.getElementById('page-title').textContent = memo.title || 'Memo';
            await loadMemos(document.getElementById('search').value);
            await selectMemo(currentId);
        }

        async function deleteCurrentMemo() {
            if (!currentId) return;
            if (!confirm('Delete this memo?')) return;

            await ipcRenderer.invoke('memo-delete', currentId);
            currentId = null;
            document.getElementById('page-title').textContent = 'Memo';
            await loadMemos(document.getElementById('search').value);
        }

        function clearEditor() {
            currentId = null;
            document.getElementById('memo-title').value = '';
            document.getElementById('memo-content').value = '';
            document.getElementById('memo-tags').value = '';
            document.getElementById('memo-meta').textContent = 'No memo selected';
            document.getElementById('page-title').textContent = 'Memo';
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text || '';
            return div.innerHTML;
        }

        function formatDate(value) {
            if (!value) return '';
            return new Date(value).toLocaleString('zh-CN');
        }

        document.getElementById('search').addEventListener('input', (event) => {
            loadMemos(event.target.value);
        });

        loadMemos();
    </script>
</body>
</html>
