<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amiya - Memo</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
            color: #243044;
            background: #f7f4ef;
        }
        .shell {
            display: grid;
            grid-template-columns: 280px 1fr;
            min-height: 100vh;
        }
        .sidebar {
            border-right: 1px solid #ddd6ca;
            background: #fffaf2;
            padding: 20px;
        }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }
        h1 {
            margin: 0;
            font-size: 22px;
            color: #334155;
        }
        .new-btn, .save-btn, .delete-btn {
            border: 0;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }
        .new-btn {
            width: 36px;
            height: 36px;
            color: white;
            background: #4f46e5;
            font-size: 22px;
        }
        .search {
            width: 100%;
            height: 36px;
            border: 1px solid #d6cec1;
            border-radius: 8px;
            padding: 0 12px;
            margin-bottom: 14px;
            background: white;
        }
        .memo-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .memo-item {
            border: 1px solid transparent;
            border-radius: 8px;
            padding: 10px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.7);
        }
        .memo-item.active {
            border-color: #4f46e5;
            background: white;
        }
        .memo-title {
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 4px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .memo-preview {
            font-size: 12px;
            color: #64748b;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .editor {
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .editor-top {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .title-input {
            flex: 1;
            height: 44px;
            border: 1px solid #d6cec1;
            border-radius: 8px;
            padding: 0 12px;
            font-size: 18px;
            font-weight: 700;
        }
        .tags-input {
            height: 36px;
            border: 1px solid #d6cec1;
            border-radius: 8px;
            padding: 0 12px;
        }
        textarea {
            flex: 1;
            min-height: 420px;
            resize: none;
            border: 1px solid #d6cec1;
            border-radius: 8px;
            padding: 14px;
            font: 14px/1.6 Consolas, "Microsoft YaHei", monospace;
        }
        .save-btn {
            height: 40px;
            padding: 0 18px;
            color: white;
            background: #2563eb;
        }
        .delete-btn {
            height: 40px;
            padding: 0 14px;
            color: white;
            background: #dc2626;
        }
        .meta {
            color: #64748b;
            font-size: 12px;
        }
        .empty {
            padding: 16px;
            color: #64748b;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="shell">
        <aside class="sidebar">
            <div class="header">
                <h1>Memo</h1>
                <button class="new-btn" onclick="newMemo()" title="新建">+</button>
            </div>
            <input class="search" id="search" placeholder="搜索 memo">
            <div class="memo-list" id="memo-list"></div>
        </aside>
        <main class="editor">
            <div class="editor-top">
                <input class="title-input" id="memo-title" placeholder="标题">
                <button class="save-btn" onclick="saveMemo()">保存</button>
                <button class="delete-btn" onclick="deleteCurrentMemo()">删除</button>
            </div>
            <input class="tags-input" id="memo-tags" placeholder="标签，用逗号分隔">
            <textarea id="memo-content" placeholder="写下要记住的内容..."></textarea>
            <div class="meta" id="memo-meta">未选择 memo</div>
        </main>
    </div>

    <script>
        const { ipcRenderer } = require('electron');

        let memos = [];
        let currentId = null;

        async function loadMemos(query = '') {
            memos = query
                ? await ipcRenderer.invoke('memo-search', query)
                : await ipcRenderer.invoke('memo-get-all');
            renderList();
            if (!currentId && memos.length > 0) {
                selectMemo(memos[0].id);
            }
            if (memos.length === 0) {
                clearEditor();
            }
        }

        function renderList() {
            const list = document.getElementById('memo-list');
            if (memos.length === 0) {
                list.innerHTML = '<div class="empty">暂无 memo</div>';
                return;
            }

            list.innerHTML = memos.map(memo => `
                <div class="memo-item ${memo.id === currentId ? 'active' : ''}" onclick="selectMemo('${memo.id}')">
                    <div class="memo-title">${escapeHtml(memo.title || 'Untitled')}</div>
                    <div class="memo-preview">${escapeHtml((memo.content || '').slice(0, 80))}</div>
                </div>
            `).join('');
        }

        async function selectMemo(id) {
            const memo = await ipcRenderer.invoke('memo-get-by-id', id);
            if (!memo) return;

            currentId = id;
            document.getElementById('memo-title').value = memo.title || '';
            document.getElementById('memo-content').value = memo.content || '';
            document.getElementById('memo-tags').value = (memo.tags || []).join(', ');
            document.getElementById('memo-meta').textContent = `Updated ${formatDate(memo.updatedAt)}`;
            renderList();
        }

        function newMemo() {
            currentId = null;
            document.getElementById('memo-title').value = '';
            document.getElementById('memo-content').value = '';
            document.getElementById('memo-tags').value = '';
            document.getElementById('memo-meta').textContent = 'New memo';
            document.getElementById('memo-title').focus();
            renderList();
        }

        async function saveMemo() {
            const memoData = {
                title: document.getElementById('memo-title').value.trim() || 'Untitled',
                content: document.getElementById('memo-content').value,
                tags: document.getElementById('memo-tags').value.split(',').map(tag => tag.trim()).filter(Boolean)
            };

            const memo = currentId
                ? await ipcRenderer.invoke('memo-update', currentId, memoData)
                : await ipcRenderer.invoke('memo-create', memoData);
            currentId = memo.id;
            await loadMemos(document.getElementById('search').value);
            await selectMemo(currentId);
        }

        async function deleteCurrentMemo() {
            if (!currentId) return;
            if (!confirm('确定要删除这个 memo 吗？')) return;

            await ipcRenderer.invoke('memo-delete', currentId);
            currentId = null;
            await loadMemos(document.getElementById('search').value);
        }

        function clearEditor() {
            currentId = null;
            document.getElementById('memo-title').value = '';
            document.getElementById('memo-content').value = '';
            document.getElementById('memo-tags').value = '';
            document.getElementById('memo-meta').textContent = '未选择 memo';
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text || '';
            return div.innerHTML;
        }

        function formatDate(value) {
            if (!value) return '';
            return new Date(value).toLocaleString('zh-CN');
        }

        document.getElementById('search').addEventListener('input', (event) => {
            loadMemos(event.target.value);
        });

        loadMemos();
    </script>
</body>
</html>
