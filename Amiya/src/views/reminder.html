<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amiya - Reminder</title>
    <link rel="stylesheet" href="styles/dashboard.css">
    <style>
        .reminder-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }
        
        .reminder-item {
            display: flex;
            align-items: flex-start;
            gap: 1rem;
            padding: 1.25rem;
            border-radius: var(--radius);
            border: 1px solid hsl(var(--border));
            background: hsl(var(--card));
            transition: all 0.15s ease;
        }
        
        .reminder-item:hover {
            border-color: hsl(var(--ring));
        }
        
        .reminder-item.disabled {
            opacity: 0.6;
        }
        
        .reminder-icon {
            width: 2.5rem;
            height: 2.5rem;
            border-radius: var(--radius);
            background: hsl(var(--muted));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            flex-shrink: 0;
        }
        
        .reminder-content {
            flex: 1;
            min-width: 0;
        }
        
        .reminder-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 0.375rem;
        }
        
        .reminder-title {
            font-weight: 600;
            font-size: 1rem;
        }
        
        .reminder-message {
            font-size: 0.875rem;
            color: hsl(var(--muted-foreground));
            margin-bottom: 0.75rem;
        }
        
        .reminder-controls {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            align-items: center;
        }
        
        .frequency-input {
            width: 5rem;
            text-align: center;
        }
        
        .reminder-meta {
            font-size: 0.75rem;
            color: hsl(var(--muted-foreground));
            margin-top: 0.75rem;
            display: flex;
            gap: 1rem;
        }
        
        .reminder-actions {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 0.75rem;
        }
        
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        
        .modal-overlay.active {
            display: flex;
        }
        
        .modal {
            background: hsl(var(--card));
            border-radius: var(--radius);
            padding: 1.5rem;
            width: 90%;
            max-width: 420px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }
        
        .modal-header {
            font-size: 1.125rem;
            font-weight: 600;
            margin-bottom: 1.25rem;
        }
        
        .form-group {
            margin-bottom: 1rem;
        }
        
        .form-label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            margin-bottom: 0.375rem;
        }
        
        .form-hint {
            font-size: 0.75rem;
            color: hsl(var(--muted-foreground));
            margin-top: 0.25rem;
        }
        
        .modal-footer {
            display: flex;
            gap: 0.75rem;
            justify-content: flex-end;
            margin-top: 1.5rem;
            padding-top: 1rem;
            border-top: 1px solid hsl(var(--border));
        }
        
        .toast {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            background: hsl(var(--primary));
            color: hsl(var(--primary-foreground));
            padding: 0.75rem 1.25rem;
            border-radius: var(--radius);
            opacity: 0;
            transform: translateY(8px);
            transition: all 0.2s ease;
            pointer-events: none;
            z-index: 2000;
        }
        
        .toast.visible {
            opacity: 1;
            transform: translateY(0);
        }
        
        .presets {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-bottom: 1rem;
        }
        
        .preset-btn {
            padding: 0.375rem 0.75rem;
            font-size: 0.75rem;
        }
    </style>
</head>
<body>
    <div class="dashboard-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">R</div>
                <span class="sidebar-title">Reminder</span>
            </div>
            
            <div class="sidebar-content">
                <div class="mb-4">
                    <div class="text-xs text-muted font-medium mb-2">QUICK ADD</div>
                    <div class="presets">
                        <button class="btn btn-outline preset-btn" onclick="quickCreate('water')">💧 Water</button>
                        <button class="btn btn-outline preset-btn" onclick="quickCreate('eyes')">👁 Rest Eyes</button>
                        <button class="btn btn-outline preset-btn" onclick="quickCreate('stand')">🧍 Stand Up</button>
                    </div>
                </div>
                
                <div class="mb-4">
                    <div class="text-xs text-muted font-medium mb-2">INFO</div>
                    <div class="text-sm text-muted">
                        <p>Reminders repeat at set intervals.</p>
                        <p class="mt-2">For one-time events, use Schedule instead.</p>
                    </div>
                </div>
            </div>
        </aside>
        
        <main class="main-content">
            <div class="page-header">
                <div>
                    <h1 class="page-title">Reminder</h1>
                    <p class="page-description">Periodic reminders for health and habits</p>
                </div>
                <button class="btn btn-primary btn-md" onclick="openNewModal()">+ New Reminder</button>
            </div>
            
            <div class="card">
                <div class="reminder-list" id="reminder-list"></div>
            </div>
        </main>
    </div>
    
    <div class="modal-overlay" id="modal">
        <div class="modal">
            <div class="modal-header">New Reminder</div>
            <form id="reminder-form">
                <div class="form-group">
                    <label class="form-label">Title *</label>
                    <input class="input" type="text" id="new-title" placeholder="e.g., Water reminder" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Message</label>
                    <textarea class="textarea" id="new-message" placeholder="e.g., Time to drink water!" style="min-height: 60px;"></textarea>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Interval (minutes)</label>
                    <input class="input" type="number" id="new-frequency" value="60" min="1">
                    <div class="form-hint">How often should this reminder trigger</div>
                </div>
                
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline btn-md" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary btn-md">Create</button>
                </div>
            </form>
        </div>
    </div>
    
    <div class="toast" id="toast"></div>

    <script>
        const { ipcRenderer } = require('electron');

        const presets = {
            water: { title: 'Water Reminder', message: 'Time to drink water!', frequencyMinutes: 60, icon: '💧' },
            eyes: { title: 'Rest Eyes', message: 'Look away from the screen and rest your eyes.', frequencyMinutes: 30, icon: '👁' },
            stand: { title: 'Stand Up', message: 'Stand up and stretch your legs.', frequencyMinutes: 45, icon: '🧍' }
        };

        const icons = {
            water: '💧',
            eyes: '👁',
            stand: '🧍',
            default: '⏰'
        };

        let reminders = [];

        async function loadReminders() {
            reminders = await ipcRenderer.invoke('reminder-get-all');
            renderReminders();
        }

        function renderReminders() {
            const list = document.getElementById('reminder-list');
            
            if (reminders.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">⏰</div>
                        <div class="empty-state-title">No reminders yet</div>
                        <div class="empty-state-description">Create a periodic reminder for health and habits</div>
                    </div>
                `;
                return;
            }
            
            list.innerHTML = reminders.map(reminder => {
                const icon = icons[reminder.id] || icons.default;
                const isDisabled = !reminder.enabled;
                
                return `
                    <div class="reminder-item ${isDisabled ? 'disabled' : ''}">
                        <div class="reminder-icon">${icon}</div>
                        <div class="reminder-content">
                            <div class="reminder-header">
                                <span class="reminder-title">${escapeHtml(reminder.title)}</span>
                                <span class="badge ${reminder.enabled ? 'badge-success' : 'badge-secondary'}">
                                    ${reminder.enabled ? 'Active' : 'Paused'}
                                </span>
                            </div>
                            <div class="reminder-message">${escapeHtml(reminder.message)}</div>
                            <div class="reminder-controls">
                                <input class="input frequency-input" type="number" id="freq-${reminder.id}" 
                                    value="${reminder.frequencyMinutes}" min="1">
                                <span class="text-sm text-muted">minutes</span>
                                <button class="btn btn-outline btn-sm" onclick="saveReminder('${reminder.id}')">Save</button>
                                <button class="btn btn-ghost btn-sm" onclick="resetReminder('${reminder.id}')">Reset</button>
                                <button class="btn btn-ghost btn-sm" onclick="triggerNow('${reminder.id}')">Test</button>
                            </div>
                            <div class="reminder-meta">
                                <span>Next: ${formatDate(reminder.nextTriggerAt)}</span>
                                ${reminder.lastTriggeredAt ? `<span>Last: ${formatDate(reminder.lastTriggeredAt)}</span>` : ''}
                            </div>
                        </div>
                        <div class="reminder-actions">
                            <label class="toggle ${reminder.enabled ? 'active' : ''}" onclick="toggleEnabled('${reminder.id}')"></label>
                            <button class="btn btn-ghost btn-sm" onclick="deleteReminder('${reminder.id}')">Delete</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        async function toggleEnabled(id) {
            const reminder = reminders.find(r => r.id === id);
            if (!reminder) return;
            
            await ipcRenderer.invoke('reminder-update', id, { enabled: !reminder.enabled });
            await loadReminders();
            showToast(reminder.enabled ? 'Reminder paused' : 'Reminder activated');
        }

        async function saveReminder(id) {
            const frequency = Number(document.getElementById(`freq-${id}`).value) || 1;
            await ipcRenderer.invoke('reminder-update', id, { frequencyMinutes: Math.max(1, frequency) });
            await loadReminders();
            showToast('Settings saved');
        }

        async function resetReminder(id) {
            await ipcRenderer.invoke('reminder-reset', id);
            await loadReminders();
            showToast('Timer reset');
        }

        async function triggerNow(id) {
            await ipcRenderer.invoke('reminder-trigger-now', id);
            showToast('Reminder triggered');
        }

        async function deleteReminder(id) {
            const reminder = reminders.find(r => r.id === id);
            if (!reminder) return;
            
            if (!confirm(`Delete "${reminder.title}"?`)) return;
            
            await ipcRenderer.invoke('reminder-delete', id);
            await loadReminders();
            showToast('Reminder deleted');
        }

        function openNewModal() {
            document.getElementById('new-title').value = '';
            document.getElementById('new-message').value = '';
            document.getElementById('new-frequency').value = 60;
            document.getElementById('modal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
        }

        async function quickCreate(type) {
            const preset = presets[type];
            if (!preset) return;
            
            await ipcRenderer.invoke('reminder-create', {
                title: preset.title,
                message: preset.message,
                frequencyMinutes: preset.frequencyMinutes,
                enabled: true
            });
            
            await loadReminders();
            showToast(`${preset.title} created`);
        }

        document.getElementById('reminder-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const title = document.getElementById('new-title').value.trim();
            const message = document.getElementById('new-message').value.trim();
            const frequency = Number(document.getElementById('new-frequency').value) || 60;

            if (!title) {
                showToast('Please enter a title');
                return;
            }

            await ipcRenderer.invoke('reminder-create', {
                title,
                message: message || title,
                frequencyMinutes: Math.max(1, frequency),
                enabled: true
            });

            closeModal();
            await loadReminders();
            showToast('Reminder created');
        });

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('visible');
            setTimeout(() => toast.classList.remove('visible'), 2000);
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatDate(value) {
            if (!value) return 'Not scheduled';
            return new Date(value).toLocaleString('zh-CN', {
                month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'
            });
        }

        document.getElementById('modal').addEventListener('click', (e) => {
            if (e.target.id === 'modal') closeModal();
        });

        loadReminders();
    </script>
</body>
</html>
