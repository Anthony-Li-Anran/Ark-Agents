<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;">
    <title>Amiya</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            background: transparent !important;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        #canvas-container {
            width: 100%;
            height: 100%;
            background: transparent;
        }
        #canvas-container.interactive {
            cursor: grab;
        }
        #canvas-container.interactive:active {
            cursor: grabbing;
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    <script src="renderer.js"></script>
</body>
</html>
